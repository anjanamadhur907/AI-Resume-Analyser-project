<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - CV Intellect</title>
    {% include "__bootstrap.html" %}
    <style>
        .auth-container {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
        }
        .input-group-text {
            background: var(--input-group-text-bg);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            padding: 12px 16px;
        }
        .auth-card .custom-input {
            border-top-left-radius: 0 !important;
            border-bottom-left-radius: 0 !important;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--border-focus);
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    {% include "__navigation.html" %}
    
    <div class="container auth-container">
        <div class="glass-card auth-card animate-fade-in">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus text-gradient mb-3" style="font-size: 2.5rem;"></i>
                <h2>Create Account</h2>
                <p class="text-muted small">Sign up to start analyzing your resumes</p>
            </div>
            
            {% if message %}
                <div class="alert text-center border-0 py-2 px-3 mb-4 rounded-lg" style="background: rgba(16, 185, 129, 0.12); color: var(--success); font-size: 0.9rem; border: 1px solid rgba(16, 185, 129, 0.2) !important;">
                    <i class="fa-solid fa-circle-check mr-1"></i> {{ message }}
                </div>
            {% endif %}
            
            <form action="/signup" method="POST">
                <div class="form-group mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        </div>
                        <input
                            type="text"
                            class="form-control custom-input"
                            name="name"
                            placeholder="John Doe"
                            required
                        >
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        </div>
                        <input
                            type="email"
                            class="form-control custom-input"
                            name="email"
                            placeholder="name@example.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        </div>
                        <input
                            type="password"
                            class="form-control custom-input"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient btn-block py-3 mb-3">
                    <i class="fa-solid fa-user-plus mr-2"></i> Sign Up
                </button>
            </form>

            <div class="text-center mt-3 text-muted small">
                Already have an account? 
                <a href="/signin" class="text-gradient font-weight-semibold ml-1">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
