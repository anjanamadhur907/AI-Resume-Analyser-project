<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - CV Intellect</title>
    {% include "__bootstrap.html" %}
    <style>
        .auth-container {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
        }
        .input-group-text {
            background: var(--input-group-text-bg);
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            padding: 12px 16px;
        }
        .auth-card .custom-input {
            border-top-left-radius: 0 !important;
            border-bottom-left-radius: 0 !important;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--border-focus);
            color: var(--color-primary);
        }
    </style>
</head>
<body>
    {% include "__navigation.html" %}
    
    <div class="container auth-container">
        <div class="glass-card auth-card animate-fade-in">
            <div class="text-center mb-4">
                <i class="fa-solid fa-wand-magic-sparkles text-gradient mb-3" style="font-size: 2.5rem;"></i>
                <h2>Welcome Back</h2>
                <p class="text-muted small">Enter your credentials to access your reports</p>
            </div>
            
            <form action="/signin" method="POST">
                <div class="form-group mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        </div>
                        <input
                            type="email"
                            class="form-control custom-input"
                            name="email"
                            placeholder="name@example.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        </div>
                        <input
                            type="password"
                            class="form-control custom-input"
                            name="password"
                            placeholder="••••••••"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient btn-block py-3 mb-3">
                    <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Sign In
                </button>
            </form>

            <div class="text-center mt-3 text-muted small">
                Don't have an account? 
                <a href="/signup" class="text-gradient font-weight-semibold ml-1">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
