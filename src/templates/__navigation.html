<style>
  .glass-nav {
      background: var(--nav-bg) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--nav-border);
      border-radius: 16px;
      box-shadow: var(--table-shadow);
      transition: all 0.3s ease;
  }
  .glass-nav:hover {
      border-color: var(--border-color-hover);
  }
  .glass-nav .nav-link {
      font-weight: 500;
      color: var(--text-muted) !important;
      padding: 8px 16px !important;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-size: 0.95rem;
  }
  .glass-nav .nav-link:hover {
      color: var(--text-main) !important;
      background: var(--nav-link-hover-bg);
  }
  .glass-nav .nav-link.btn-gradient {
      color: #ffffff !important;
  }
  .glass-nav .nav-link.btn-gradient:hover {
      color: #ffffff !important;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%) !important;
      opacity: 0.95;
  }
  .glass-nav .nav-link.btn-outline-glass {
      color: var(--text-main) !important;
  }
  .glass-nav .navbar-brand {
      font-weight: 800;
      font-size: 1.3rem;
  }
  .glass-nav .btn-signout {
      color: var(--danger) !important;
      font-weight: 600;
      border: 1px solid rgba(239, 68, 68, 0.25) !important;
      border-radius: 8px;
      padding: 8px 18px !important;
      transition: all 0.2s ease;
  }
  .glass-nav .btn-signout:hover {
      background: rgba(239, 68, 68, 0.12) !important;
      border-color: var(--danger) !important;
      color: #fff !important;
  }
  @media (max-width: 767.98px) {
      .glass-nav {
          border-radius: 12px;
          margin-top: 10px !important;
      }
      .glass-nav .navbar-collapse {
          background: var(--nav-collapse-bg);
          border-radius: 8px;
          padding: 15px;
          margin-top: 10px;
          border: 1px solid var(--nav-border);
      }
  }
</style>

<nav class="navbar navbar-expand-md navbar-dark glass-nav mt-3 mx-2 mx-md-4 px-3 px-md-4 py-2 sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <i class="fa-solid fa-wand-magic-sparkles mr-2 text-gradient" style="font-size: 1.4rem;"></i>
      <span class="text-gradient">CV Intellect</span>
    </a>
    
    <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-md-center">
        <li class="nav-item">
          <a class="nav-link" href="/"><i class="fa-solid fa-house mr-1" style="font-size: 0.85rem;"></i> Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/resume/upload"><i class="fa-solid fa-file-arrow-up mr-1" style="font-size: 0.85rem;"></i> Upload Resume</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/dashboard"><i class="fa-solid fa-chart-line mr-1" style="font-size: 0.85rem;"></i> Dashboard</a>
        </li>
        
        <!-- Theme Toggle Button -->
        <li class="nav-item mr-md-2 mt-2 mt-md-0 d-flex justify-content-center">
          <button id="theme-toggle-btn" class="nav-link btn btn-link text-decoration-none border-0 px-3 py-2 d-flex align-items-center justify-content-center" style="box-shadow: none; background: transparent; cursor: pointer;" onclick="toggleTheme()">
            <i id="theme-toggle-icon" class="fa-solid fa-sun" style="font-size: 1.05rem;"></i>
          </button>
        </li>

        {% if request.session.get("is_logged_in", None) %}
        <li class="nav-item ml-md-2 mt-2 mt-md-0">
          <a class="nav-link btn-signout" href="/signout"><i class="fa-solid fa-right-from-bracket mr-1"></i> Signout</a>
        </li>
        {% else %}
        <li class="nav-item ml-md-2 mt-2 mt-md-0">
          <a class="nav-link text-light btn-outline-glass px-3 py-2 mr-md-2 d-inline-block text-center" href="/signin" style="padding: 8px 16px !important;"><i class="fa-solid fa-right-to-bracket mr-1"></i> Signin</a>
        </li>
        <li class="nav-item mt-2 mt-md-0">
          <a class="nav-link btn-gradient text-white px-3 py-2 d-inline-block text-center" href="/signup" style="padding: 8px 16px !important;"><i class="fa-solid fa-user-plus mr-1"></i> Signup</a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<script>
  function updateThemeUI() {
      const isLight = document.documentElement.classList.contains("light-theme");
      const icon = document.getElementById("theme-toggle-icon");
      if (icon) {
          if (isLight) {
              icon.className = "fa-solid fa-moon";
              icon.style.color = "var(--text-main)";
          } else {
              icon.className = "fa-solid fa-sun";
              icon.style.color = "#f59e0b";
          }
      }
  }

  function toggleTheme() {
      const doc = document.documentElement;
      if (doc.classList.contains("light-theme")) {
          doc.classList.remove("light-theme");
          localStorage.setItem("theme", "dark");
      } else {
          doc.classList.add("light-theme");
          localStorage.setItem("theme", "light");
      }
      updateThemeUI();
  }

  // Ensure UI is in sync on load
  document.addEventListener("DOMContentLoaded", updateThemeUI);
</script>
